spring.application.name=medecin
server.port=${PORT:9000}

# ===== PostgreSQL (PROD Render) =====
# La configuration PostgreSQL est gérée par DatabaseConfig.java
# qui supporte DATABASE_URL (format Render) ou variables séparées (DB_HOST, DB_USER, etc.)
# Ne pas définir spring.datasource.* ici pour éviter les conflits avec DatabaseConfig

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=INFO
spring.jpa.open-in-view=false

# Debug: vérifier quel profil est chargé
logging.level.org.springframework.core.env=DEBUG

# Render Free: pool petit (évite RAM issues)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ===== OpenAI (Azure) =====
openai.api.endpoint=${OPENAI_API_ENDPOINT:https://archimatchaiagent.openai.azure.com}
openai.api.deployment=${OPENAI_API_DEPLOYMENT:khoja-chat}
openai.api.key=${OPENAI_API_KEY:}