spring.application.name=medecin
server.port=${PORT:9000}

# ===== PostgreSQL (PROD Render) =====
# DataSource configuree par DatabaseConfig.java (parse DATABASE_URL automatiquement)

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.root=INFO

# HikariCP pool (Render Free tier)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ===== OpenAI (Azure) =====
openai.api.endpoint=${OPENAI_API_ENDPOINT:https://archimatchaiagent.openai.azure.com}
openai.api.deployment=${OPENAI_API_DEPLOYMENT:khoja-chat}
openai.api.key=${OPENAI_API_KEY:}
