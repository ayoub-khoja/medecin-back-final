services:
  - type: web
    name: medecin-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: SPRING_DATASOURCE_URL
        sync: false  # À configurer dans le dashboard Render
      - key: SPRING_DATASOURCE_USERNAME
        sync: false  # À configurer dans le dashboard Render
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false  # À configurer dans le dashboard Render
      - key: OPENAI_API_KEY
        sync: false  # À configurer dans le dashboard Render
      - key: OPENAI_API_ENDPOINT
        value: https://archimatchaiagent.openai.azure.com
      - key: OPENAI_API_DEPLOYMENT
        value: khoja-chat
